{% extends "base.html" %}

{% block title %}My Wishlist{% endblock %}

{% block content %}

<style>
.dashboard-container {
    display: flex;
    width: 85%;
    margin: 40px auto;
    gap: 40px;
}

.dashboard-menu {
    width: 25%;
    background: #f5f5f5;
    padding: 20px;
    border-radius: 6px;
}

.dashboard-menu a {
    display: block;
    padding: 12px 0;
    border-bottom: 1px solid #ddd;
    text-decoration: none;
    color: black;
}

.dashboard-menu a:hover {
    color: #333;
}

.wishlist-content {
    width: 75%;
}

.share-icons span {
    font-size: 20px;
    margin-right: 10px;
    cursor: pointer;
}

.wishlist-link-box {
    display: flex;
    align-items: center;
    margin-top: 10px;
}

.wishlist-link-box input {
    width: 350px;
    padding: 8px;
    border: 1px solid #ccc;
}

.copy-btn {
    background: black;
    color: white;
    padding: 8px 18px;
    margin-left: 5px;
    cursor: pointer;
    border: none;
}
/* ===============================
   WISHLIST – 320px MOBILE
================================ */
@media (max-width: 320px) {

  /* PAGE TITLE */
  h1 {
    font-size: 22px;
    margin-top: 25px;
  }

  /* DASHBOARD LAYOUT */
  .dashboard-container {
    flex-direction: column;
    width: 100%;
    margin: 20px auto;
    gap: 20px;
    padding: 0 12px;
  }

  /* LEFT MENU */
  .dashboard-menu {
    width: 100%;
    padding: 15px;
  }

  .dashboard-menu a {
    font-size: 14px;
    padding: 10px 0;
  }

  /* RIGHT CONTENT */
  .wishlist-content {
    width: 100%;
  }

  .wishlist-content h4 {
    font-size: 16px;
    margin-bottom: 10px;
  }

  /* SHARE ICONS */
  .share-icons span {
    font-size: 22px;
    margin-right: 12px;
  }

  /* LINK BOX */
  .wishlist-link-box {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    margin-top: 8px;
  }

  .wishlist-link-box input {
    width: 100%;          /* 🔥 fixed width removed */
    font-size: 12px;
    padding: 8px;
  }

  .copy-btn {
    width: 100%;
    padding: 10px;
    font-size: 13px;
  }

}

</style>

<h1 style="text-align:center; margin-top:90px;">My Wishlist</h1>

<div class="dashboard-container">

    <!-- LEFT MENU -->
    <div class="dashboard-menu">
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'orders' %}">Orders</a>
        <a href="{% url 'downloads' %}">Downloads</a>
        <a href="{% url 'addresses' %}">Addresses</a>
        <a href="{% url 'account_details' %}">Account details</a>
        <a href="{% url 'compare' %}">Compare</a>
        <a href="{% url 'wishlist' %}">Wishlist</a>
        <a href="{% url 'logout' %}">Log out</a>
    </div>

    <!-- RIGHT SIDE CONTENT -->
    <div class="wishlist-content">

        <h4>Share On:</h4>

        <div class="share-icons">
            <span>👍</span>
            <span>🐦</span>
            <span>📌</span>
            <span>✉️</span>
        </div>

        <br><br>

        <label><strong>Wishlist Link:</strong></label>
        <div class="wishlist-link-box">
            <input id="wishlistInput" type="text" value="{{ wishlist_link }}" readonly>
            <button class="copy-btn" onclick="copyWishlist()">COPY</button>
        </div>

    </div>

</div>

<script>
function copyWishlist() {
    var copyText = document.getElementById("wishlistInput");
    copyText.select();
    navigator.clipboard.writeText(copyText.value);
    alert("Wishlist link copied!");
}
</script>

{% endblock %}
